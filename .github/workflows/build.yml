name: Build Vemobile

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-bundle:
    name: Build JS Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: vencord-mobile-bundle/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: vencord-mobile-bundle
        run: pnpm install --frozen-lockfile

      - name: Build JS bundle
        working-directory: vencord-mobile-bundle
        run: pnpm build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: vemobile-bundle
          path: |
            vencord-mobile-bundle/dist/vemobile.js
            vencord-mobile-bundle/dist/vemobile.css

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-bundle
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: vemobile-bundle
          path: vemobile/assets/

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: vemobile

      - name: Build APK (debug)
        run: flutter build apk --debug
        working-directory: vemobile

      - name: Build APK (release)
        run: flutter build apk --release
        working-directory: vemobile

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vemobile-apk
          path: |
            vemobile/build/app/outputs/flutter-apk/app-debug.apk
            vemobile/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: build-bundle
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: vemobile-bundle
          path: vemobile/assets/

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: vemobile

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug
        working-directory: vemobile

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vemobile-ios
          path: vemobile/build/ios/iphoneos/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vemobile-apk/*.apk
            vemobile-bundle/vemobile.js
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
