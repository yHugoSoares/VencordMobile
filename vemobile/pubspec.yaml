name: vemobile
description: Vemobile — Vencord for Mobile, a modded Discord client shell
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  url_launcher: ^6.3.0
  package_info_plus: ^10.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/vemobile.js
    - assets/vemobile.css
